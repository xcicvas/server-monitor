services:
  backend:
    build: ./backend
    container_name: photo-depth_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    container_name: photo-depth_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
